# Smart Project Tracker — Nginx Reverse Proxy
# ──────────────────────────────────────────────
# Optimized for Docker Compose + Streamlit
# WebSocket + SSE support for live timer fragments
#
# Usage: Mounted as volume in docker-compose.yml
# SSL: Uncomment the SSL section and provide certs for production

upstream streamlit {
    server tracker:8501;
}

# ─── HTTP Server (default) ─────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Block access to sensitive files
    location ~* /(credentials\.json|\.env|\.streamlit/secrets\.toml) {
        deny all;
        return 404;
    }

    # Block access to private key files
    location ~* \.(key|pem)$ {
        deny all;
        return 404;
    }

    # Streamlit main proxy — WebSocket + SSE support
    location / {
        proxy_pass http://streamlit;
        proxy_http_version 1.1;

        # WebSocket support (critical for Streamlit)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (required for @st.fragment live updates)
        proxy_set_header X-Accel-Buffering "no";

        # Timeouts — long-lived connections for WebSocket/SSE
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # No buffering for real-time updates
        proxy_buffering off;
        proxy_cache off;
    }

    # Streamlit static assets
    location /static/ {
        proxy_pass http://streamlit/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Streamlit health check endpoint
    location /_stcore/health {
        proxy_pass http://streamlit/_stcore/health;
    }

    # Streamlit component library
    location /component/ {
        proxy_pass http://streamlit/component/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

