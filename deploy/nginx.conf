# Smart Project Tracker — Nginx Reverse Proxy
# Place in /etc/nginx/sites-available/tracker
# Then: sudo ln -s /etc/nginx/sites-available/tracker /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name tracker.yourdomain.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tracker.yourdomain.com;

    # SSL Certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/tracker.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tracker.yourdomain.com/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Streamlit requires WebSocket support
    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # WebSocket support (critical for Streamlit)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # Buffering
        proxy_buffering off;
        proxy_cache off;
    }

    # Streamlit static assets
    location /static/ {
        proxy_pass http://127.0.0.1:8501/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Streamlit health check
    location /_stcore/health {
        proxy_pass http://127.0.0.1:8501/_stcore/health;
    }

    # Block access to credentials
    location /credentials.json {
        deny all;
        return 404;
    }
}
